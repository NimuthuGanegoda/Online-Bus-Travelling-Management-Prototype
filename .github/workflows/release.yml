name: Auto Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docs/diagrams/prototype-system-architecture-diagram.png
            docs/diagrams/prototype-system-architecture-diagram.pdf
            docs/diagrams/prototype-use-case-diagram.png
            docs/diagrams/prototype-use-case-diagram.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
